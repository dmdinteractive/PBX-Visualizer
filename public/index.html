<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>HELLO! — Live Telephony Diagram</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="scope"></canvas>

  <!-- Title block, drawn like the heading on the CMD Networking diagrams -->
  <div id="titleblock">
    <h1><span id="exhibit-title">HELLO!</span> <span id="subtitle">LIVE TELEPHONY DIAGRAM</span></h1>
  </div>

  <!-- Explanatory text block, in the place the source diagram puts its notes -->
  <div id="notes">
    <div class="row"><span class="k">Calls in progress</span><span class="v" id="s-active">0</span></div>
    <div class="row"><span class="k">Ringing</span><span class="v" id="s-ringing">0</span></div>
    <div class="row"><span class="k">On automated message</span><span class="v" id="s-messages">0</span></div>
    <div class="row"><span class="k">Calls today</span><span class="v" id="s-handled">0</span></div>
    <div class="row"><span class="k">Subscriber lines</span><span class="v" id="s-lines">0</span></div>
    <div class="spacer"></div>
    <div class="row"><span class="k">Time</span><span class="v" id="clock">--:--:--</span></div>
    <div class="row"><span class="k">Uptime</span><span class="v" id="s-uptime">00:00:00</span></div>
    <div class="row"><span class="k">Switch link</span><span class="v" id="link">--</span></div>

    <div class="conn-head">CONNECTIONS <span class="src">Western&nbsp;Electric colours</span></div>
    <div id="connections"><div class="none">— all lines idle —</div></div>
  </div>

  <!-- Key, bottom right, as on the source diagram -->
  <div id="key">
    <div class="krow"><svg viewBox="0 0 60 12"><line x1="2" y1="6" x2="46" y2="6"/><circle cx="51" cy="6" r="4"/></svg><span>Subscriber Line</span></div>
    <div class="krow"><svg viewBox="0 0 60 12"><line x1="6" y1="6" x2="54" y2="6"/><polygon points="2,6 9,3 9,9"/><polygon points="58,6 51,3 51,9"/></svg><span>Trunk Line</span></div>
    <div class="krow"><svg viewBox="0 0 60 12"><circle cx="30" cy="6" r="4"/></svg><span>On&#8209;Hook</span></div>
    <div class="krow"><svg viewBox="0 0 60 12"><circle cx="30" cy="6" r="4" class="fill"/></svg><span>In Use</span></div>
    <div class="krow"><svg viewBox="0 0 60 12"><line x1="2" y1="6" x2="58" y2="6" stroke-dasharray="5 4"/></svg><span>Ringing</span></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
