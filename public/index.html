<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>HELLO! — Bell System Long Lines</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="frame">

    <header id="topbar">
      <div class="brand">
        <svg class="bell-logo" viewBox="0 0 64 64" aria-hidden="true">
          <circle cx="32" cy="32" r="30" class="bell-ring" />
          <path class="bell-body" d="M21 43 C21 29 24.5 21 32 21 C39.5 21 43 29 43 43 Z" />
          <rect class="bell-body" x="17" y="43" width="30" height="3.4" rx="1.2" />
          <circle class="bell-body" cx="32" cy="17.5" r="3.1" />
          <circle class="bell-body" cx="32" cy="49.5" r="2.4" />
        </svg>
        <span id="site">BELL SYSTEM</span>
        <span class="sep">//</span>
        <span id="exhibit-title">HELLO!</span>
      </div>
      <div class="readout">
        <span id="clock">--:--:--</span>
        <span id="link" class="link down">LINK DOWN</span>
      </div>
    </header>

    <canvas id="scope"></canvas>

    <footer id="statusbar">
      <div class="stat"><label>IN PROGRESS</label><span id="s-active">0</span></div>
      <div class="stat"><label>RINGING</label><span id="s-ringing">0</span></div>
      <div class="stat"><label>ON RECORDING</label><span id="s-messages">0</span></div>
      <div class="stat"><label>CALLS TODAY</label><span id="s-handled">0</span></div>
      <div class="stat"><label>UPTIME</label><span id="s-uptime">00:00:00</span></div>
      <div class="legend">
        <span class="key"><i class="sub"></i>SUBSCRIBER LINE</span>
        <span class="key"><i class="trunk"></i>TRUNK LINE</span>
        <span class="key"><i class="sw ringing"></i>RINGING</span>
        <span class="key"><i class="sw internal"></i>PHONE&nbsp;↔&nbsp;PHONE</span>
        <span class="key"><i class="sw toll"></i>TOLL</span>
        <span class="key"><i class="sw msg"></i>GHOST</span>
      </div>
    </footer>

  </div>

  <div class="scanlines" aria-hidden="true"></div>
  <script src="app.js"></script>
</body>
</html>
